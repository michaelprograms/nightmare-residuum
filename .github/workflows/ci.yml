name: Unit Tests on ubuntu

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7
      with:
        submodules: true

    - name: Install Packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: build-essential autoconf automake bison telnet \
          libmysqlclient-dev libpcre3-dev libpq-dev libsqlite3-dev \
          libssl-dev libtool libz-dev libgtest-dev libjemalloc-dev
        version: 1.0

    - name: Cache Driver
      uses: actions/cache@v6
      id: cache
      with:
        path: build
        key: ${{ hashFiles('**/driver/src') }}

    - name: Build Driver
      if: steps.cache.outputs.cache-hit != 'true'
      run: ./build.sh
      shell: bash
      timeout-minutes: 10

    - name: Run Tests
      run: |
        ./build/bin/driver lib/secure/etc/local.config -ftest
      shell: bash
      timeout-minutes: 1

    - name: LPC Code Problems
      uses: jlchmura/lpc-build-action@main
      with:
        lpc-config: ${{ github.workspace }}/lpc-config.json